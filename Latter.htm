<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Special Surprise For You ✨</title>
    <style>
      /* Base Styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      :root {
        --safe-top: max(12px, env(safe-area-inset-top));
        --safe-right: max(12px, env(safe-area-inset-right));
        --safe-bottom: max(12px, env(safe-area-inset-bottom));
        --safe-left: max(12px, env(safe-area-inset-left));
      }

      body {
        background: linear-gradient(135deg, #f8e1f4, #e0c3f7, #c2e6ff);
        background-size: 400% 400%;
        animation: gradientBackground 15s ease infinite;
        min-height: 100vh;
        min-height: 100dvh;
        overflow-x: hidden;
        position: relative;
        padding: var(--safe-top) var(--safe-right)
          calc(var(--safe-bottom) + 106px) var(--safe-left);
      }

      .container {
        width: min(800px, 100%);
        max-width: 800px;
        margin: 0 auto;
        padding: 20px 20px calc(var(--safe-bottom) + 20px);
        position: relative;
        z-index: 10;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeIn 3s forwards 0.5s;
      }

      /* Header Styles */
      header {
        text-align: center;
        margin-bottom: 40px;
        position: relative;
      }

      h1 {
        font-size: 2.5rem;
        color: #6a4c93;
        margin-bottom: 15px;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
      }

      /* Letter Section */
      .letter-container {
        background: rgba(255, 255, 255, 0.7);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 0 20px rgba(106, 76, 147, 0.3);
        margin-bottom: 40px;
        position: relative;
        overflow: hidden;
      }

      .letter-container::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        border-radius: 20px;
        box-shadow: inset 0 0 15px rgba(255, 215, 232, 0.7);
        pointer-events: none;
        z-index: 1;
      }

      .letter {
        font-size: 1.2rem;
        line-height: 1.6;
        color: #333;
        position: relative;
        z-index: 2;
        min-height: 200px;
      }

      .video-container {
        display: none;
        position: relative;
        width: 100%;
        padding-top: 56.25%; /* 16:9 Aspect Ratio */
        margin-bottom: 40px;
        border-radius: 15px;
        overflow: hidden;
        box-shadow:
          0 0 20px rgba(106, 76, 147, 0.3),
          0 0 30px rgba(255, 215, 232, 0.5);
      }

      .video-container iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
      }

      /* Surprise Button */
      .surprise-button-container {
        width: 100%;
        display: flex;
        justify-content: flex-end;
        margin: 30px 0;
        position: relative;
      }

      .surprise-button {
        background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fad0c4, #a18cd1);
        background-size: 300% 300%;
        animation: gradientButton 5s ease infinite;
        color: white;
        font-size: 1.5rem;
        font-weight: bold;
        padding: 15px 40px;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 5px 20px rgba(161, 140, 209, 0.5);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        z-index: 2;
        max-width: 100%;
      }

      .surprise-button::before {
        content: "";
        position: absolute;
        top: -5px;
        left: -5px;
        right: -5px;
        bottom: -5px;
        border-radius: 55px;
        background: linear-gradient(45deg, #ffccf9, #b28cff, #b28cff, #9cecff);
        background-size: 300% 300%;
        animation: gradientButton 5s ease infinite;
        z-index: -1;
        opacity: 0.6;
        filter: blur(8px);
      }

      .surprise-button:hover {
        transform: translateY(-3px) scale(1.05);
        box-shadow: 0 8px 25px rgba(161, 140, 209, 0.7);
      }

      .surprise-button:active {
        transform: translateY(1px);
      }

      /* Surprise Modal */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        padding: 24px;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
      }

      .modal {
        background: white;
        width: 90%;
        max-width: 600px;
        border-radius: 20px;
        padding: 30px;
        position: relative;
        max-height: min(86vh, 760px);
        overflow-y: auto;
        transform: scale(0.8);
        transition: all 0.3s ease;
        box-shadow: 0 0 30px rgba(255, 215, 232, 0.8);
        text-align: center;
      }

      .modal-overlay.active {
        opacity: 1;
        visibility: visible;
      }

      .modal-overlay.active .modal {
        transform: scale(1);
      }

      .modal-header {
        margin-bottom: 20px;
      }

      .modal-body {
        margin-bottom: 30px;
      }

      .modal-close {
        position: absolute;
        top: 15px;
        right: 15px;
        font-size: 24px;
        color: #6a4c93;
        background: none;
        border: none;
        cursor: pointer;
      }

      /* Playlist Styling */
      .playlist {
        background: rgba(255, 255, 255, 0.9);
        border-radius: 15px;
        padding: 20px;
        max-height: min(40vh, 300px);
        overflow-y: auto;
      }

      .playlist-item {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        padding: 10px;
        border-radius: 10px;
        background: rgba(240, 240, 255, 0.7);
        transition: all 0.2s ease;
      }

      .playlist-item:hover {
        background: rgba(225, 225, 255, 0.9);
        transform: translateX(5px);
      }

      .playlist-item.active {
        background: rgba(214, 208, 245, 0.95);
        box-shadow: inset 0 0 0 2px rgba(106, 76, 147, 0.25);
        transform: translateX(8px);
      }

      .playlist-item img {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        margin-right: 4px;
        object-fit: cover;
      }

      .playlist-item-info {
        flex-grow: 1;
        text-align: left;
      }

      .playlist-item-title {
        font-weight: bold;
        color: #6a4c93;
      }

      .playlist-item-artist {
        font-size: 0.9rem;
        color: #888;
      }

      .playlist-item-play {
        background: none;
        border: none;
        color: #6a4c93;
        cursor: pointer;
        font-size: 1.2rem;
        transition: transform 0.2s ease;
      }

      .playlist-item-play:hover {
        transform: scale(1.12);
      }

      .playlist-item-play:focus-visible {
        outline: 2px solid #6a4c93;
        border-radius: 6px;
      }

      /* Back Button */
      .back-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin-top: 20px;
        padding: 10px 20px;
        background: rgba(255, 255, 255, 0.7);
        border: 2px solid #6a4c93;
        color: #6a4c93;
        border-radius: 30px;
        text-decoration: none;
        font-weight: bold;
        transition: all 0.3s ease;
      }

      .back-button:hover {
        background: #6a4c93;
        color: white;
      }

      /* Floating Elements */
      .floating-element {
        position: absolute;
        pointer-events: none;
        opacity: 0.7;
        z-index: 1;
        animation-name: float;
        animation-timing-function: ease-in-out;
        animation-iteration-count: infinite;
        animation-direction: alternate;
      }

      /* Music Controls */
      .music-controls {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 100;
        background: rgba(255, 255, 255, 0.7);
        border-radius: 50%;
        width: 50px;
        height: 50px;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 0 10px rgba(106, 76, 147, 0.3);
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .music-controls:hover {
        transform: scale(1.1);
      }

      .music-controls i {
        color: #6a4c93;
        font-size: 24px;
      }

      /* Animations */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes gradientBackground {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      @keyframes gradientButton {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      @keyframes float {
        0% {
          transform: translateY(0) rotate(0deg);
        }
        100% {
          transform: translateY(-20px) rotate(5deg);
        }
      }

      /* Cursor Effect */
      .cursor-effect {
        position: absolute;
        width: 15px;
        height: 15px;
        border-radius: 50%;
        background: rgba(255, 182, 193, 0.7);
        pointer-events: none;
        z-index: 1000;
        transform: translate(-50%, -50%);
        transition: opacity 0.5s ease;
        opacity: 0;
      }

      /* Responsive Design */
      @media (max-width: 768px) {
        h1 {
          font-size: 2rem;
        }

        .container {
          padding: 15px 10px calc(var(--safe-bottom) + 12px);
        }

        .letter-container {
          padding: 20px;
        }

        .letter {
          font-size: 1rem;
        }

        .surprise-button-container {
          justify-content: center;
        }

        .surprise-button {
          font-size: 1.2rem;
          padding: 12px 30px;
        }

        .modal-overlay {
          padding: 14px;
        }

        .modal {
          width: 100%;
          padding: 22px 16px;
          border-radius: 18px;
        }

        .playlist {
          padding: 14px;
          max-height: min(44vh, 330px);
        }

        .floating-element {
          max-width: 40px;
          max-height: 40px;
        }
      }

      @media (max-width: 560px) {
        h1 {
          font-size: clamp(1.8rem, 10vw, 2.2rem);
          margin-bottom: 10px;
        }

        .letter-container {
          padding: 14px;
          border-radius: 16px;
        }

        .letter {
          font-size: 0.98rem;
          line-height: 1.55;
        }

        .surprise-button-container {
          justify-content: center;
          margin: 22px 0;
        }

        .surprise-button {
          width: 100%;
          font-size: 1.02rem;
          padding: 11px 18px;
        }

        .modal-overlay {
          align-items: flex-start;
          overflow-y: auto;
          padding: 10px;
        }

        .modal {
          margin-top: var(--safe-top);
          border-radius: 14px;
          padding: 18px 12px;
        }

        .modal-header {
          margin-bottom: 12px;
        }

        .modal-body {
          margin-bottom: 12px;
        }

        .playlist {
          padding: 10px;
          border-radius: 12px;
          max-height: min(48vh, 360px);
        }

        .playlist-item {
          padding: 8px;
          gap: 8px;
        }

        .playlist-item img {
          width: 36px;
          height: 36px;
        }

        .playlist-item-title {
          font-size: 0.96rem;
        }

        .playlist-item-artist {
          font-size: 0.82rem;
        }

        .playlist-item-play {
          font-size: 1rem;
        }

        .back-button {
          width: min(100%, 280px);
          text-align: center;
        }

        .floating-element {
          opacity: 0.45;
        }
      }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.12/typed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.5.1/confetti.browser.min.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Fade in animation
        setTimeout(() => {
          document.querySelector(".container").style.opacity = 1;
        }, 500);

        // Typewriter effect for letter
        const letterContent =
          "My Babe😚🥰💝,\n\nAs I sit here thinking about all our memories together, I can't help but smile. From our late-night talks to our spontaneous adventures, you've filled my life with so much joy and laughter. You've been my shoulder to cry on, my partner in crime, and my biggest supporter.\n\nOn your special day, I want you to know how grateful I am to have you in my life. You make every day brighter just by being you - kind, funny, and incredibly thoughtful.\n\nHappy Birthday to my favorite person in the world! Here's to many more years of friendship, laughter, and creating memories together.\n\nWith all my love,\n[Phen Mauh😚💝🤍]";

        new Typed("#typed-text", {
          strings: [letterContent],
          typeSpeed: 30,
          showCursor: true,
          cursorChar: "|",
          onComplete: function () {
            setTimeout(() => {
              document
                .querySelector(".surprise-button")
                .classList.add(
                  "animate__animated",
                  "animate__pulse",
                  "animate__infinite",
                );
            }, 1000);
          },
        });

        // Create floating elements
        const floatingElements = [
          { type: "heart", color: "#ff6b8a", size: "20px" },
          { type: "heart", color: "#f48fb1", size: "30px" },
          { type: "star", color: "#ffd54f", size: "25px" },
          { type: "star", color: "#ffecb3", size: "15px" },
          { type: "teddy", emoji: "🧸", size: "30px" },
          { type: "sparkle", emoji: "✨", size: "25px" },
          { type: "sparkle", emoji: "✨", size: "20px" },
          { type: "heart", color: "#ff6b8a", size: "25px" },
          { type: "star", color: "#ffd54f", size: "20px" },
          { type: "teddy", emoji: "🧸", size: "25px" },
        ];

        floatingElements.forEach((element, index) => {
          createFloatingElement(element, index);
        });

        // Cursor effect
        document.addEventListener("mousemove", createCursorEffect);

        // Surprise button functionality
        const surpriseButton = document.getElementById("surprise-button");
        const modalOverlay = document.getElementById("modal-overlay");
        const modalClose = document.getElementById("modal-close");
        const clickSound = document.getElementById("click-sound");
        const playlistItems = Array.from(
          document.querySelectorAll(".playlist-item"),
        );
        const playlistPlayButtons = Array.from(
          document.querySelectorAll(".playlist-item-play"),
        );
        let currentPlaylistIndex = 0;

        function setActivePlaylistItem(index) {
          if (playlistItems.length === 0) return;

          const total = playlistItems.length;
          currentPlaylistIndex = (index + total) % total;

          playlistItems.forEach((item, itemIndex) => {
            item.classList.toggle("active", itemIndex === currentPlaylistIndex);
          });

          playlistItems[currentPlaylistIndex].scrollIntoView({
            behavior: "smooth",
            block: "nearest",
          });
        }

        surpriseButton.addEventListener("click", function () {
          clickSound.play();
          modalOverlay.classList.add("active");
          setActivePlaylistItem(currentPlaylistIndex);
          confetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.6 },
          });
        });

        modalClose.addEventListener("click", function () {
          modalOverlay.classList.remove("active");
        });

        playlistPlayButtons.forEach((button, index) => {
          button.addEventListener("click", function (e) {
            e.preventDefault();
            e.stopPropagation();
            clickSound.currentTime = 0;
            clickSound.play().catch(() => {});
            setActivePlaylistItem(index + 1);
          });
        });

        playlistItems.forEach((item, index) => {
          item.addEventListener("click", function () {
            setActivePlaylistItem(index + 1);
          });
        });

        // Helper Functions
        function createFloatingElement(element, index) {
          const floatingElement = document.createElement("div");
          floatingElement.classList.add("floating-element");

          if (element.emoji) {
            floatingElement.textContent = element.emoji;
            floatingElement.style.fontSize = element.size;
          } else if (element.type === "heart") {
            floatingElement.innerHTML = '<i class="fas fa-heart"></i>';
            floatingElement.style.color = element.color;
            floatingElement.style.fontSize = element.size;
          } else if (element.type === "star") {
            floatingElement.innerHTML = '<i class="fas fa-star"></i>';
            floatingElement.style.color = element.color;
            floatingElement.style.fontSize = element.size;
          }

          // Random positioning
          const randomX = Math.random() * window.innerWidth;
          const randomY = Math.random() * window.innerHeight;
          floatingElement.style.left = `${randomX}px`;
          floatingElement.style.top = `${randomY}px`;

          // Animation duration and delay
          const duration = 5 + Math.random() * 10;
          const delay = Math.random() * 5;
          floatingElement.style.animationDuration = `${duration}s`;
          floatingElement.style.animationDelay = `${delay}s`;

          document.body.appendChild(floatingElement);
        }

        function createCursorEffect(e) {
          const cursorEffect = document.createElement("div");
          cursorEffect.classList.add("cursor-effect");
          cursorEffect.style.left = `${e.pageX}px`;
          cursorEffect.style.top = `${e.pageY}px`;
          document.body.appendChild(cursorEffect);

          setTimeout(() => {
            cursorEffect.style.opacity = 1;
            cursorEffect.style.transform = `translate(-50%, -50%) scale(${Math.random() * 0.5 + 0.5})`;

            setTimeout(() => {
              cursorEffect.style.opacity = 0;
              setTimeout(() => {
                cursorEffect.remove();
              }, 500);
            }, 300);
          }, 10);
        }
      });
    </script>

    <script>
      (function () {
        const STORAGE_KEY = "birthdayRadioStateV1";
        const CLAIM_KEY = "birthdayRadioClaimV1";
        const CLAIM_CHANNEL = "birthday-radio-control";
        const INSTANCE_ID = `${Date.now()}_${Math.random()
          .toString(36)
          .slice(2)}`;
        const player = document.getElementById("global-birthday-radio");
        if (!player) return;

        const audio = document.getElementById("global-radio-audio");
        const toggleBtn = document.getElementById("global-radio-toggle");
        const volumeSlider = document.getElementById("global-radio-volume");
        const channel =
          typeof BroadcastChannel !== "undefined"
            ? new BroadcastChannel(CLAIM_CHANNEL)
            : null;

        let lastSavedAt = 0;
        const saved = loadState();
        let shouldResumeWhenPossible = saved.playing;

        function clamp(value, min, max) {
          const n = Number(value);
          if (Number.isNaN(n)) return min;
          return Math.min(max, Math.max(min, n));
        }

        function loadState() {
          try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return { playing: true, volume: 0.5, currentTime: 0 };
            const parsed = JSON.parse(raw);
            return {
              playing: Boolean(parsed.playing),
              volume: clamp(parsed.volume, 0, 1),
              currentTime: Math.max(0, Number(parsed.currentTime) || 0),
            };
          } catch {
            return { playing: true, volume: 0.5, currentTime: 0 };
          }
        }

        function setButtonByState() {
          if (audio.paused) {
            toggleBtn.innerHTML = "&#9654;";
            toggleBtn.setAttribute("aria-label", "Play music");
          } else {
            toggleBtn.innerHTML = "&#10074;&#10074;";
            toggleBtn.setAttribute("aria-label", "Pause music");
          }
        }

        function saveState(force = false) {
          const now = Date.now();
          if (!force && now - lastSavedAt < 700) return;
          lastSavedAt = now;
          const next = {
            playing: !audio.paused,
            volume: audio.volume,
            currentTime: Number.isFinite(audio.currentTime)
              ? audio.currentTime
              : 0,
            updatedAt: now,
          };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
        }

        function claimPlayback() {
          const payload = { id: INSTANCE_ID, at: Date.now() };
          try {
            localStorage.setItem(CLAIM_KEY, JSON.stringify(payload));
          } catch {
            // Ignore storage write errors.
          }
          if (channel) {
            channel.postMessage({ type: "claim", id: INSTANCE_ID });
          }
        }

        function handleExternalClaim(externalId) {
          if (!externalId || externalId === INSTANCE_ID) return;
          if (!audio.paused) {
            shouldResumeWhenPossible = false;
            audio.pause();
            setButtonByState();
            saveState(true);
          }
        }

        if (channel) {
          channel.addEventListener("message", (event) => {
            const data = event.data || {};
            if (data.type === "claim") {
              handleExternalClaim(data.id);
            }
          });
        }

        window.addEventListener("storage", (event) => {
          if (event.key !== CLAIM_KEY || !event.newValue) return;
          try {
            const parsed = JSON.parse(event.newValue);
            handleExternalClaim(parsed.id);
          } catch {
            // Ignore malformed storage payloads.
          }
        });

        async function tryPlay() {
          try {
            await audio.play();
            shouldResumeWhenPossible = true;
            claimPlayback();
          } catch {
            // Browser may block autoplay until user interacts.
          }
          setButtonByState();
          saveState(true);
        }

        function applySavedState() {
          audio.volume = saved.volume;
          volumeSlider.value = String(saved.volume);

          const seekAndMaybePlay = () => {
            if (saved.currentTime > 0 && Number.isFinite(saved.currentTime)) {
              try {
                const maxTime =
                  Number.isFinite(audio.duration) && audio.duration > 0
                    ? Math.max(0, audio.duration - 0.25)
                    : saved.currentTime;
                audio.currentTime = Math.min(saved.currentTime, maxTime);
              } catch {
                // Ignore seek errors.
              }
            }

            if (saved.playing) {
              tryPlay();
            } else {
              setButtonByState();
            }
          };

          if (audio.readyState >= 1) {
            seekAndMaybePlay();
          } else {
            audio.addEventListener("loadedmetadata", seekAndMaybePlay, {
              once: true,
            });
          }
        }

        toggleBtn.addEventListener("click", async () => {
          if (audio.paused) {
            await tryPlay();
          } else {
            shouldResumeWhenPossible = false;
            audio.pause();
            setButtonByState();
            saveState(true);
          }
        });

        volumeSlider.addEventListener("input", () => {
          audio.volume = clamp(volumeSlider.value, 0, 1);
          saveState(true);
        });

        audio.addEventListener("play", () => {
          setButtonByState();
          shouldResumeWhenPossible = true;
          claimPlayback();
          saveState(true);
        });

        audio.addEventListener("pause", () => {
          setButtonByState();
          saveState(true);
        });

        audio.addEventListener("timeupdate", () => {
          if (!audio.paused) saveState();
        });

        document.addEventListener(
          "click",
          (event) => {
            const target = event.target.closest("a[href], button");
            if (target) saveState(true);
          },
          true,
        );

        window.addEventListener("pagehide", () => {
          saveState(true);
          if (channel) {
            channel.close();
          }
        });
        document.addEventListener("visibilitychange", () => {
          if (document.hidden) saveState(true);
        });

        applySavedState();
        setButtonByState();

        // If autoplay is blocked, start music on first user interaction.
        if (shouldResumeWhenPossible) {
          const resumeOnFirstInteraction = () => {
            if (audio.paused && shouldResumeWhenPossible) {
              tryPlay();
            }
          };
          window.addEventListener("click", resumeOnFirstInteraction, {
            once: true,
          });
          window.addEventListener("touchstart", resumeOnFirstInteraction, {
            once: true,
          });
          window.addEventListener("keydown", resumeOnFirstInteraction, {
            once: true,
          });
        }
      })();
    </script>
  </body>
